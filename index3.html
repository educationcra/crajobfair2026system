<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRA Job Fair 2026 - Closed</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.8.11/dist/dotlottie-wc.js" type="module"></script>
  
  <style>
    body { font-family: 'Prompt', sans-serif; overflow: hidden; }
    
    /* Animation Background */
    @keyframes floatUp {
        0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
        10% { opacity: 0.15; }
        80% { opacity: 0.15; }
        100% { transform: translateY(-20vh) rotate(20deg); opacity: 0; }
    }
    .bg-icon-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .floating-icon { position: absolute; top: 0; color: white; opacity: 0; animation: floatUp linear infinite; line-height: 1; }
    
    .glass-panel { 
        background: rgba(255, 255, 255, 0.9); 
        backdrop-filter: blur(16px); 
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 3rem; 
    }

    .status-badge {
        background: rgba(249, 115, 22, 0.1);
        color: #ea580c;
        padding: 0.5rem 1.5rem;
        border-radius: 9999px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid rgba(249, 115, 22, 0.2);
    }
  </style>
</head>

<body class="min-h-dvh relative flex flex-col items-center justify-center p-4">
  <div class="fixed inset-0 w-full h-full bg-gradient-to-br from-orange-500 via-red-500 to-rose-600 -z-50"></div>
  
  <div class="bg-icon-container">
      <i class="fi fi-sr-graduation-cap floating-icon text-9xl" style="left: 5%; animation-duration: 20s;"></i>
      <i class="fi fi-sr-analyse-alt floating-icon text-9xl" style="left: 35%; animation-duration: 22s; animation-delay: 2s;"></i>
      <i class="fi fi-sr-microchip floating-icon text-9xl" style="left: 65%; animation-duration: 24s; animation-delay: 1s;"></i>
      <i class="fi fi-sr-stethoscope floating-icon text-8xl" style="left: 80%; animation-duration: 26s; animation-delay: 6s;"></i>
  </div>

  <div class="w-full max-w-2xl relative z-10 animate-fade-in">
      <div class="glass-panel p-8 md:p-16 text-center flex flex-col items-center gap-8">
          
          <div>
              <div class="mb-6">
                <span class="status-badge">
                    <i class="fi fi-sr-calendar-exclamation"></i>
                    Service Unavailable
                </span>
              </div>
              <h1 class="text-4xl md:text-5xl font-bold text-gray-800 tracking-tight leading-tight mb-4">
                  CRA JOB FAIR &<br/>
                  <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600">EDUCATION 2026</span>
              </h1>
          </div>

          <div class="relative w-full max-w-[300px] h-[300px] mx-auto">
              <dotlottie-wc src="https://lottie.host/ef534813-19b0-4679-903d-4790b0d4ee40/JkiBf0lw92.lottie" autoplay loop class="w-full h-full"></dotlottie-wc>
          </div>

          <div class="space-y-4">
              <h2 class="text-2xl md:text-3xl font-bold text-gray-700">ขออภัย ระบบไม่พร้อมใช้งาน</h2>
              <p class="text-gray-500 text-lg md:text-xl max-w-md mx-auto leading-relaxed">
                  เนื่องจากขณะนี้ **ไม่อยู่ในช่วงเวลาจัดงาน** <br> 
                  จึงไม่สามารถทำรายการลงทะเบียนได้ในขณะนี้
              </p>
          </div>

          <div class="mt-4 pt-8 border-t border-gray-100 w-full text-center">
              <p class="text-gray-400 text-sm">
                  ติดตามข่าวสารเพิ่มเติมได้ที่ <br>
                  <span class="font-semibold text-orange-500">ราชวิทยาลัยจุฬาภรณ์</span>
              </p>
              <p class="text-xs text-gray-300 mt-6 italic">© 2026 Chulabhorn Royal Academy | by.Chanon jeera</p>
          </div>
      </div>
  </div>

</body>
</html>
